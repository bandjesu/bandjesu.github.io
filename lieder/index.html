<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Lieder - Ein Ton, ein Herz</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>

*{
box-sizing:border-box;
margin:0;
padding:0;
}

body{
font-family:'Inter',sans-serif;
background:linear-gradient(135deg,#f7f9fc,#eef2f7);
color:#1f2937;
min-height:100vh;
display:flex;
flex-direction:column;
}

/* HEADER */

header{
position:fixed;
top:0;
width:100%;
padding:14px 40px;

display:flex;
align-items:center;
justify-content:space-between;

backdrop-filter:blur(10px);
background:rgba(255,255,255,0.75);
border-bottom:1px solid rgba(0,0,0,0.05);

z-index:1000;
}

#header-text-wrapper{
display:flex;
align-items:center;
gap:12px;
}

#logo{
width:46px;
}

#header-text{
font-size:20px;
font-weight:600;
color:#2563eb;
}

#sub-text{
font-size:13px;
color:#6b7280;
}

nav{
display:flex;
gap:30px;
}

nav a{
text-decoration:none;
font-weight:500;
color:#374151;
position:relative;
transition:0.3s;
}

nav a:hover{
color:#2563eb;
}

nav a.active::after{
content:"";
position:absolute;
bottom:-6px;
left:0;
width:100%;
height:2px;
background:#2563eb;
border-radius:2px;
}

/* SONG GRID */

.content{
margin-top:120px;
padding:40px;

display:grid;
grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
gap:30px;
}

/* SONG CARD */

.song-card{

background:white;
border-radius:18px;
overflow:hidden;

box-shadow:0 10px 30px rgba(0,0,0,0.08);

transition:
transform .35s ease,
box-shadow .35s ease;
}

.song-card:hover{
transform:translateY(-6px);
box-shadow:0 20px 40px rgba(0,0,0,0.12);
}

.song-card img{
width:100%;
height:200px;
object-fit:cover;
}

.song-content{
padding:18px;
text-align:center;
}

.song-title{
font-weight:600;
margin-bottom:12px;
}

/* BUTTONS */

.audio-buttons{
display:flex;
flex-direction:column;
gap:8px;
}

.audio-button{

background:#2563eb;
color:white;

border:none;
border-radius:8px;

padding:10px;
cursor:pointer;

font-size:14px;
transition:0.25s;
}

.audio-button:hover{
background:#1d4ed8;
}

/* FOOTER */

footer{
margin-top:auto;
padding:18px;
text-align:center;
font-size:14px;

background:#111827;
color:#9ca3af;
}

/* PASSWORD MODAL */

.password-modal{

position:fixed;
top:0;
left:0;
width:100%;
height:100%;

background:rgba(0,0,0,0.5);

display:flex;
justify-content:center;
align-items:center;

z-index:2000;
}

.password-modal-content{

background:white;

padding:30px;
border-radius:16px;

box-shadow:0 10px 30px rgba(0,0,0,0.2);

text-align:center;
}

.password-input{

padding:10px;
margin-top:10px;
margin-bottom:10px;

border-radius:8px;
border:1px solid #ccc;
width:200px;
}

.password-button{

background:#2563eb;
color:white;

border:none;
border-radius:8px;

padding:10px 18px;
cursor:pointer;
}

/* MOBILE */

@media (max-width:700px){

header{
padding:12px 20px;
}

nav{
gap:15px;
font-size:14px;
}

.content{
padding:25px;
}

}

</style>
</head>

<body>

<div class="password-modal" id="password-modal">

<h2>Bitte geben Sie das Passwort ein</h2>

<input type="password" id="password-input" class="password-input" placeholder="Passwort">

<br>

<button onclick="checkPassword()" class="password-button">
Bestätigen
</button>

</div>


<script>

const PASSWORD="Schinkengipfeli";

function checkPassword(){

const passwordInput=document.getElementById("password-input").value;

if(passwordInput===PASSWORD){
document.getElementById("password-modal").style.display="none";
}else{
alert("Falsches Passwort. Bitte versuchen Sie es erneut.");
}

}

function toggleAudio(audioId,buttonId){

var audio=document.getElementById(audioId);
var button=document.getElementById(buttonId);

if(audio.paused){

audio.play();
button.innerHTML="Stopp Musik";

}else{

audio.pause();
audio.currentTime=0;
button.innerHTML="Spiele Musik";

}

}

function downloadImage(url,filename){

fetch(url)
.then(response=>response.blob())
.then(blob=>{

const url=window.URL.createObjectURL(blob);

const a=document.createElement('a');
a.href=url;
a.download=filename;

document.body.appendChild(a);
a.click();

window.URL.revokeObjectURL(url);

})
.catch(console.error);

}

</script>
